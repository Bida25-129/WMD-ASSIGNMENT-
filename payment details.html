<!-- Embedded Payment Form Section (Matches Blessing Fitness Index Styling) -->

<section class="payment-section py-5 bg-dark text-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <div class="card bg-black border-secondary text-light p-4 shadow">
          <h3 class="text-center mb-4 fw-bold">Payment Details</h3>

          <!-- success message -->
          <div id="successMsg" class="alert alert-success d-none text-center">
            Payment submitted successfully!
          </div>

          <form id="paymentForm">

            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control bg-dark text-light border-secondary" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control bg-dark text-light border-secondary" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Payment Method</label>
              <select class="form-select bg-dark text-light border-secondary" required>
                <option value="">Select method</option>
                <option>Credit Card</option>
                <option>Debit Card</option>
                <option>Mobile Money</option>
                <option>Bank Transfer</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Account / Reference Number</label>
              <input type="text" class="form-control bg-dark text-light border-secondary" placeholder="Enter account or reference number" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 fw-semibold">Submit Payment</button>

          </form>

        </div>

      </div>
    </div>
  </div>
</section>

<!-- Simple interactivity -->
<script>
  const form = document.getElementById('paymentForm');
  const msg = document.getElementById('successMsg');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    msg.classList.remove('d-none');
    form.reset();

    setTimeout(() => {
      msg.classList.add('d-none');
    }, 3000);
  });
</script>
